worker_processes 2;
daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    server {
        listen 8888;

        location /health {
            health_status;
            health_probe http://127.0.0.1:19001/probe;
            health_probe_interval 100ms;
            health_probe_timeout 100ms;
            health_probe_fails 1;
            health_probe_passes 2;
        }

        location /healthz {
            health_liveness;
        }

        location /ready {
            health_readiness;
        }

        location / {
            echozn "Hello World";
        }

        location /fail {
            return 500 "fail\n";
        }
    }
}
