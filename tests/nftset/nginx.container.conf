user root root;
daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    server {
        listen 8888;

        nftset_table nginz_test;
        nftset_family ip;
        nftset_fail_open off;

        location /ready {
            echozn "ready ok";
        }

        location /block-hit {
            nftset on;
            nftset_set blocklist;
            echozn "block-hit ok";
        }

        location /block-miss {
            nftset on;
            nftset_set emptyblock;
            echozn "block-miss ok";
        }

        location /allow-hit {
            nftset on;
            nftset_set trusted;
            nftset_deny off;
            echozn "allow-hit ok";
        }

        location /allow-miss {
            nftset on;
            nftset_set emptytrusted;
            nftset_deny off;
            echozn "allow-miss ok";
        }

        location /status-hit {
            nftset on;
            nftset_set statuslist;
            nftset_status 429;
            echozn "status-hit ok";
        }

        location /variable-block-hit {
            nftset on;
            nftset_set blocklist;
            add_header X-Nftset-Result $nftset_result always;
            echozn "variable-block-hit ok";
        }

        location /variable-allow-hit {
            nftset on;
            nftset_set trusted;
            nftset_deny off;
            add_header X-Nftset-Result $nftset_result always;
            echozn "variable-allow-hit ok";
        }

        location /dryrun-hit {
            nftset on;
            nftset_set blocklist;
            nftset_dryrun on;
            add_header X-Nftset-Result $nftset_result always;
            echozn "dryrun-hit ok";
        }
    }
}
