user root root;
daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    server {
        listen 8888;
        listen [::]:8888;

        nftset_table nginz_test;
        nftset_family ip;
        nftset_fail_open off;

        location /ready {
            echozn "ready ok";
        }

        location /block-hit {
            nftset on;
            nftset_set blocklist;
            echozn "block-hit ok";
        }

        location /block-miss {
            nftset on;
            nftset_set emptyblock;
            echozn "block-miss ok";
        }

        location /allow-hit {
            nftset on;
            nftset_set trusted;
            nftset_deny off;
            echozn "allow-hit ok";
        }

        location /allow-miss {
            nftset on;
            nftset_set emptytrusted;
            nftset_deny off;
            echozn "allow-miss ok";
        }

        location /status-hit {
            nftset on;
            nftset_set statuslist;
            nftset_status 429;
            echozn "status-hit ok";
        }

        location /variable-block-hit {
            nftset on;
            nftset_set blocklist;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "variable-block-hit ok";
        }

        location /variable-allow-hit {
            nftset on;
            nftset_set trusted;
            nftset_deny off;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "variable-allow-hit ok";
        }

        location /dryrun-hit {
            nftset on;
            nftset_set blocklist;
            nftset_dryrun on;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "dryrun-hit ok";
        }

        location /cache-positive {
            nftset on;
            nftset_set cachepositive;
            nftset_cache_ttl 1200ms;
            add_header X-Nftset-Result $nftset_result always;
            echozn "cache-positive ok";
        }

        location /cache-negative {
            nftset on;
            nftset_set cachenegative;
            nftset_cache_ttl 1200ms;
            add_header X-Nftset-Result $nftset_result always;
            echozn "cache-negative ok";
        }

        location /cache-disabled {
            nftset on;
            nftset_set cachedisabled;
            nftset_cache_ttl 0;
            add_header X-Nftset-Result $nftset_result always;
            echozn "cache-disabled ok";
        }

        location /autoadd-basic {
            nftset_autoadd on;
            nftset_autoadd_table nginz_test;
            nftset_autoadd_set honeypot;
            echozn "autoadd-basic ok";
        }

        location /autoadd-timeout {
            nftset_autoadd on;
            nftset_autoadd_table nginz_test;
            nftset_autoadd_set honeypot_timeout;
            nftset_autoadd_timeout 1200ms;
            echozn "autoadd-timeout ok";
        }

        location /autoadd-lookup-shared {
            nftset on;
            nftset_set autoaddshared;
            nftset_autoadd on;
            nftset_autoadd_table nginz_test;
            nftset_autoadd_set autoaddshared;
            nftset_cache_ttl 5s;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "autoadd-lookup-shared ok";
        }

        location /autoadd-family-mismatch {
            nftset_autoadd on;
            nftset_autoadd_table nginz_test;
            nftset_autoadd_set blocklist6;
            nftset_autoadd_family ip6;
            echozn "autoadd-family-mismatch ok";
        }

        location /ratelimit-plain {
            nftset_ratelimit_rate 3r/s;
            echozn "ratelimit-plain ok";
        }

        location /ratelimit-burst {
            nftset_ratelimit_rate 2r/s;
            nftset_ratelimit_burst 1;
            echozn "ratelimit-burst ok";
        }

        location /ratelimit-parent {
            nftset_ratelimit_rate 2r/s;
            nftset_ratelimit_burst 2;

            location /ratelimit-parent/child-zero-burst {
                nftset_ratelimit_burst 0;
                echozn "ratelimit-child-zero-burst ok";
            }
        }

        location /ratelimit-autoban {
            nftset on;
            nftset_set ratelimit_banned;
            nftset_cache_ttl 5s;
            nftset_ratelimit_rate 1r/s;
            nftset_autoban_table nginz_test;
            nftset_autoban_set ratelimit_banned;
            nftset_autoban_timeout 1200ms;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "ratelimit-autoban ok";
        }

        location /missing-set-fail-closed {
            nftset on;
            nftset_set definitely_missing;
            add_header X-Nftset-Result $nftset_result always;
            echozn "missing-set-fail-closed ok";
        }

        location /missing-set-fail-open {
            nftset on;
            nftset_set definitely_missing;
            nftset_fail_open on;
            add_header X-Nftset-Result $nftset_result always;
            echozn "missing-set-fail-open ok";
        }

        location /family-mismatch {
            nftset on;
            nftset_set blocklist6;
            nftset_family ip6;
            add_header X-Nftset-Result $nftset_result always;
            echozn "family-mismatch ok";
        }

        location /family-mismatch-fail-open {
            nftset on;
            nftset_set blocklist6;
            nftset_family ip6;
            nftset_fail_open on;
            add_header X-Nftset-Result $nftset_result always;
            echozn "family-mismatch-fail-open ok";
        }

        location /ip6-hit {
            nftset on;
            nftset_set blocklist6;
            nftset_family ip6;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "ip6-hit ok";
        }

        location /ip6-miss {
            nftset on;
            nftset_set emptyblock6;
            nftset_family ip6;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "ip6-miss ok";
        }

        location /multi-block-hit {
            nftset on;
            nftset_sets nginz_test:emptyblock nginz_test:blocklist;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "multi-block-hit ok";
        }

        location /multi-block-miss {
            nftset on;
            nftset_sets nginz_test:emptyblock nginz_test:multiblockmiss;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "multi-block-miss ok";
        }

        location /multi-allow-hit {
            nftset on;
            nftset_sets nginz_test:emptytrusted nginz_test:trusted;
            nftset_deny off;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "multi-allow-hit ok";
        }

        location /multi-allow-miss {
            nftset on;
            nftset_sets nginz_test:emptytrusted nginz_test:multiallowmiss;
            nftset_deny off;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "multi-allow-miss ok";
        }

        location /cidr-hit {
            nftset on;
            nftset_set cidrblock;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "cidr-hit ok";
        }

        location /cidr-miss {
            nftset on;
            nftset_set cidrmiss;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "cidr-miss ok";
        }
    }
}
