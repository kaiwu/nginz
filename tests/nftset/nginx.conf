worker_processes 2;
daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    # Directives can be set at http{} level and inherited down
    nftset_cache_ttl 30s;
    nftset_autoadd_table filter;
    nftset_autoadd_family inet;
    nftset_autoban_table filter;
    nftset_autoban_family inet;

    server {
        listen 8888;

        # server-level defaults inherited by all locations below
        nftset_table   filter;
        nftset_set     blocklist;
        nftset_family  inet;
        nftset_fail_open on;

        # Basic blocklist
        location /blocklist {
            nftset on;
            nftset_deny on;
            echozn "blocklist ok";
        }

        # Allowlist mode
        location /allowlist {
            nftset on;
            nftset_set trusted;
            nftset_deny off;
            nftset_fail_open off;
            echozn "allowlist ok";
        }

        # Default directives only (table/set/family from server block above)
        location /defaults {
            nftset on;
            echozn "defaults ok";
        }

        # nftset explicitly disabled
        location /disabled {
            nftset off;
            echozn "disabled ok";
        }

        # No nftset directive at all
        location /unset {
            echozn "unset ok";
        }

        # Custom block status code (429)
        location /status-429 {
            nftset on;
            nftset_set status429-missing;
            nftset_deny off;
            nftset_fail_open off;
            nftset_status 429;
            echozn "status-429 ok";
        }

        # fail_open: allow on lookup error
        location /fail-open {
            nftset on;
            nftset_fail_open on;
            echozn "fail-open ok";
        }

        # Dryrun: log but never block
        location /dryrun {
            nftset on;
            nftset_dryrun on;
            echozn "dryrun ok";
        }

        # Custom cache TTL overrides server default
        location /cache-ttl {
            nftset on;
            nftset_cache_ttl 5s;
            echozn "cache-ttl ok";
        }

        location /autoadd {
            nftset_autoadd on;
            nftset_autoadd_set honeypot;
            echozn "autoadd ok";
        }

        location /autoadd-inherit {
            nftset_autoadd on;
            nftset_autoadd_set inherited_honeypot;
            echozn "autoadd-inherit ok";
        }

        location /autoadd-timeout {
            nftset_autoadd on;
            nftset_autoadd_set timed_honeypot;
            nftset_autoadd_timeout 5s;
            echozn "autoadd-timeout ok";
        }

        location /ratelimit {
            nftset_ratelimit_rate 3r/s;
            echozn "ratelimit ok";
        }

        location /ratelimit-burst {
            nftset_ratelimit_rate 2r/s;
            nftset_ratelimit_burst 1;
            echozn "ratelimit-burst ok";
        }

        location /ratelimit-parent {
            nftset_ratelimit_rate 2r/s;
            nftset_ratelimit_burst 2;

            location /ratelimit-parent/child-zero-burst {
                nftset_ratelimit_burst 0;
                echozn "ratelimit-child-zero-burst ok";
            }
        }

        location /autoban {
            nftset on;
            nftset_set autoban_shared;
            nftset_cache_ttl 5s;
            nftset_ratelimit_rate 1r/s;
            nftset_autoban_set autoban_shared;
            nftset_autoban_timeout 5s;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "autoban ok";
        }

        # Multi-set OR logic
        location /multi-set {
            nftset on;
            nftset_sets filter:firstset filter:secondset;
            echozn "multi-set ok";
        }

        location /multi-set-allow {
            nftset on;
            nftset_sets filter:firsttrusted filter:secondtrusted;
            nftset_deny off;
            echozn "multi-set-allow ok";
        }

        # Expose $nftset_result in response header for testing
        location /variable {
            nftset on;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "variable ok";
        }

        # Dryrun + $nftset_result
        location /variable-dryrun {
            nftset on;
            nftset_dryrun on;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "variable-dryrun ok";
        }

        # Auto-detect: no nftset_family set — family resolved from connection at runtime
        location /auto-family {
            nftset on;
            nftset_dryrun on;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "auto-family ok";
        }

        # Explicit family override still works
        location /explicit-family {
            nftset on;
            nftset_family inet;
            nftset_dryrun on;
            add_header X-Nftset-Result $nftset_result always;
            add_header X-Nftset-Matched-Set $nftset_matched_set always;
            echozn "explicit-family ok";
        }

        # IPv6 family
        location /ipv6 {
            nftset on;
            nftset_table inet6filter;
            nftset_set blocklist6;
            nftset_family ip6;
            echozn "ipv6 ok";
        }

        # Parent inherits to child
        location /parent {
            nftset on;
            nftset_deny on;

            location /parent/child {
                echozn "child ok";
            }
        }
    }
}
