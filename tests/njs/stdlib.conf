daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    js_engine qjs;

    js_path ".";
    js_import main from stdlib.js;

    server {
        listen 8888;

        # querystring
        location /qs/stringify {
            client_body_in_single_buffer on;
            js_content main.qs_stringify;
        }

        location /qs/parse {
            js_content main.qs_parse;
        }

        location /qs/roundtrip {
            js_content main.qs_roundtrip;
        }

        # fs
        location /fs/write {
            client_body_in_single_buffer on;
            js_content main.fs_write;
        }

        location /fs/read {
            js_content main.fs_read;
        }

        location /fs/append {
            client_body_in_single_buffer on;
            js_content main.fs_append;
        }

        location /fs/unlink {
            js_content main.fs_unlink;
        }

        # xml
        location /xml/root-name {
            js_content main.xml_root_name;
        }

        location /xml/child-text {
            js_content main.xml_child_text;
        }

        location /xml/attribute {
            js_content main.xml_attribute;
        }

        location /xml/multiple-tags {
            js_content main.xml_multiple_tags;
        }

        location /xml/nested {
            js_content main.xml_nested;
        }

        location /xml/serialize {
            js_content main.xml_serialize;
        }
    }
}
