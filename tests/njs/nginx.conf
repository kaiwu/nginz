daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    js_engine qjs;

    js_path ".";
    js_import main from njs.js;

    js_set $dec_foo main.dec_foo;

    server {
        listen 8888;

        location /hello {
            js_content main.hello;
        }

        location /version {
            js_content main.version;
        }

        location /method {
            js_content main.echo_method;
        }

        location /uri {
            js_content main.echo_uri;
        }

        location /args {
            js_content main.echo_args;
        }

        location /header {
            js_content main.echo_header;
        }

        location /set-header {
            js_content main.set_response_header;
        }

        location /body {
            client_body_in_single_buffer on;
            js_content main.echo_body;
        }

        location /json {
            client_body_in_single_buffer on;
            js_content main.json_echo;
        }

        location /base64 {
            js_content main.base64_encode;
        }

        location /sha256 {
            js_content main.sha256_hash;
        }

        location /hmac {
            js_content main.hmac_sha256;
        }

        location /var {
            return 200 $dec_foo;
        }
    }
}
