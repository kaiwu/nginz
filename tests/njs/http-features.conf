daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    js_engine qjs;

    js_path ".";
    js_import main from http_features.js;

    js_shared_dict_zone zone=kv:1M;

    server {
        listen 8888;

        # subrequest targets
        location /sub/echo {
            return 200 $arg_msg;
        }

        location /sub/noContent {
            return 204;
        }

        # subrequest handlers
        location /subrequest/echo {
            js_content main.subrequest_echo;
        }

        location /subrequest/join {
            js_content main.subrequest_join;
        }

        location /subrequest/status {
            js_content main.subrequest_status;
        }

        # ngx.fetch handlers
        location /fetch/get {
            js_content main.fetch_get;
        }

        location /fetch/json {
            js_content main.fetch_json;
        }

        location /fetch/post {
            client_body_in_single_buffer on;
            js_content main.fetch_post;
        }

        location /fetch/headers {
            js_content main.fetch_headers;
        }

        # shared dict handlers
        location /dict/set {
            js_content main.dict_set;
        }

        location /dict/get {
            js_content main.dict_get;
        }

        location /dict/delete {
            js_content main.dict_delete;
        }

        location /dict/incr {
            js_content main.dict_incr;
        }
    }
}
