daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    wechatpay_apiclient_key_file fixtures/test_private.pem;
    wechatpay_public_key_file fixtures/test_public.pem;
    wechatpay_apiclient_serial APICLIENTSERIAL123;
    wechatpay_serial PLATFORMSERIAL456;
    wechatpay_mch_id 1900001111;

    server {
        listen 8888;

        location /encrypt {
            wechatpay_oaep_encrypt on;
        }

        location /decrypt {
            wechatpay_oaep_decrypt on;
        }

        location /notify {
            wechatpay_access;
            echoz_read_request_body;
            echozn "verified:";
            echoz_request_body;
        }

        location /proxy {
            wechatpay_proxy_pass http://127.0.0.1:19001;
        }

        location /proxy-bad {
            wechatpay_proxy_pass http://127.0.0.1:19001;
        }

        location / {
            echozn "ok";
        }
    }
}
