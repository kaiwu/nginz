worker_processes 2;
daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    server {
        listen 8888;

        # Rate limited endpoint (5 requests per second)
        location /api {
            ratelimit_rate 5r/s;
            echozn "api ok";
        }

        # Rate limited with burst (3 req/s + 2 burst = 5 total per window)
        location /burst {
            ratelimit_rate 3r/s;
            ratelimit_burst 2;
            echozn "burst ok";
        }

        # Very low limit for testing (2 req/s)
        location /strict {
            ratelimit_rate 2r/s;
            echozn "strict ok";
        }

        # Plain numeric syntax without r/s suffix
        location /plain {
            ratelimit_rate 4;
            echozn "plain ok";
        }

        # Variable-driven key (shared bucket across endpoints)
        location /shared-a {
            set $rl_key shared-user;
            ratelimit_rate 2r/s;
            ratelimit_key $rl_key;
            echozn "shared-a ok";
        }

        location /shared-b {
            set $rl_key shared-user;
            ratelimit_rate 2r/s;
            ratelimit_key $rl_key;
            echozn "shared-b ok";
        }

        # Variable-driven cost
        location /costly {
            set $rl_cost 2;
            ratelimit_rate 3r/s;
            ratelimit_cost $rl_cost;
            add_header X-Ratelimit-Cost $ratelimit_cost always;
            add_header X-Ratelimit-Key $ratelimit_key always;
            add_header X-Ratelimit-Source $ratelimit_source always;
            add_header X-Ratelimit-Result $ratelimit_result always;
            echozn "costly ok";
        }

        # Variable-driven skip/bypass
        location /skip {
            set $rl_skip 1;
            ratelimit_rate 1r/s;
            ratelimit_skip $rl_skip;
            add_header X-Ratelimit-Result $ratelimit_result always;
            echozn "skip ok";
        }

        # Child explicitly setting rate=10 must not inherit the parent's non-10 rate
        location /inherit-parent {
            ratelimit_rate 2r/s;

            location /inherit-parent/child-rate-10 {
                ratelimit_rate 10r/s;
                echozn "child-rate-10 ok";
            }
        }

        # Same variable key in different locations should remain location-scoped
        location /shared-parent-a {
            set $rl_key same-customer;
            ratelimit_rate 2r/s;
            ratelimit_key $rl_key;
            echozn "shared-parent-a ok";
        }

        location /shared-parent-b {
            set $rl_key same-customer;
            ratelimit_rate 2r/s;
            ratelimit_key $rl_key;
            echozn "shared-parent-b ok";
        }

        # Observability headers for default IP-based path
        location /observed {
            ratelimit_rate 2r/s;
            add_header X-Ratelimit-Cost $ratelimit_cost always;
            add_header X-Ratelimit-Key $ratelimit_key always;
            add_header X-Ratelimit-Source $ratelimit_source always;
            add_header X-Ratelimit-Result $ratelimit_result always;
            echozn "observed ok";
        }

        # Non-rate-limited endpoint
        location / {
            return 200 "ok\n";
        }
    }
}
