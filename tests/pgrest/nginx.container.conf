daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    server {
        listen 8888;

        location /api/ {
            pgrest_pass "host=127.0.0.1 port=5432 dbname=nginz_test user=nginz_test password=nginz_test_pass";
            pgrest_schemas "public";
        }

        location /rpc/ {
            pgrest_pass "host=127.0.0.1 port=5432 dbname=nginz_test user=nginz_test password=nginz_test_pass";
            pgrest_schemas "public";
        }
    }

}
