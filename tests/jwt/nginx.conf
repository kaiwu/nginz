worker_processes 1;
error_log logs/error.log debug;
daemon off;
master_process off;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    server {
        listen 8888;

        # Protected endpoint with JWT
        location /protected {
            jwt_secret "my-secret-key-for-testing-hs256";

            echozn "Access granted";
        }

        # Public endpoint (no JWT)
        location /public {
            echozn "Public content";
        }

        # JWT-protected API endpoints
        location /api {
            jwt_secret "api-secret-key-for-testing";

            location /api/users {
                echozn "Users list";
            }
        }

        # Explicit child under protected parent to verify inheritance
        location /admin {
            jwt_secret "api-secret-key-for-testing";

            location /admin/settings {
                echozn "Admin settings";
            }
        }

        # Public API endpoint (no JWT)
        location /api/public {
            echozn "Public API";
        }
    }
}
