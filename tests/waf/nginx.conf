daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    server {
        listen 8888;

        # Default location with WAF enabled in block mode
        location /api {
            waf on;
            waf_mode block;
            waf_sqli on;
            waf_xss on;
            echozn "api response";
        }

        # Location with WAF in detect mode (logs but doesn't block)
        location /detect {
            waf on;
            waf_mode detect;
            waf_sqli on;
            waf_xss on;
            echozn "detect response";
        }

        # Parent detect mode with nested child inheriting mode/settings
        location /detect-parent {
            waf on;
            waf_mode detect;
            waf_sqli on;
            waf_xss on;

            location /detect-parent/child {
                echozn "detect child response";
            }
        }

        # Location with WAF disabled
        location /disabled {
            waf off;
            echozn "disabled response";
        }

        # Location with only SQLi detection
        location /sqli-only {
            waf on;
            waf_mode block;
            waf_sqli on;
            waf_xss off;
            echozn "sqli-only response";
        }

        # Location with only XSS detection
        location /xss-only {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss on;
            echozn "xss-only response";
        }

        # Location with body checking enabled
        location /body {
            waf on;
            waf_mode block;
            waf_sqli on;
            waf_xss on;
            waf_check_body on;
            echozn "body response";
        }

        # Clean endpoint for normal requests
        location /clean {
            waf on;
            waf_mode block;
            echozn "clean response";
        }

        # Native rule-file subset (block mode)
        location /rules {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules response";
        }

        # Native rule-file subset (detect mode)
        location /rules-detect {
            waf on;
            waf_mode detect;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules detect response";
        }

        # Body rule without built-in SQLi/XSS detectors
        location /rules-body {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules body response";
        }

        location /rules-headers {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules headers response";
        }

        location /rules-cookies {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules cookies response";
        }

        location /rules-method {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules method response";
        }

        location /rules-ip {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules ip response";
        }

        location /rules-regex {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules regex response";
        }

        location /rules-equals {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules equals response";
        }

        location /rules-header-selector {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules header selector response";
        }

        location /rules-cookie-selector {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules cookie selector response";
        }

        location /rules-arg-selector {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules arg selector response";
        }

        location /rules-status {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules status response";
        }

        location /rules-begins-with {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules beginsWith response";
        }

        location /rules-ends-with {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules endsWith response";
        }

        location /rules-query-string {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules query string response";
        }

        location /rules-request-line {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules request line response";
        }

        location /rules-pm {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules pm response";
        }

        location /rules-body-selector-form {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules body selector form response";
        }

        location /rules-body-selector-json {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules body selector json response";
        }

        location /rules-deny {
            waf on;
            waf_mode detect;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_ACTION_RULES_FILE__;
            echozn "rules deny response";
        }

        location /rules-pass {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_ACTION_RULES_FILE__;
            echozn "rules pass response";
        }

        location /rules-ban {
            waf on;
            waf_mode detect;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_BAN_RULES_FILE__;
            waf_ban_threshold 2;
            waf_ban_window 60;
            waf_ban_duration 2;
            echozn "rules ban response";
        }

        location /rules-score {
            waf on;
            waf_mode detect;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_SCORE_RULES_FILE__;
            waf_ban_duration 2;
            waf_score_threshold 2;
            waf_score_decay_window 2;
            echozn "rules score response";
        }

        # Explicit libinjection rule operators
        location /rules-libinjection {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_LIBINJECTION_RULES_FILE__;
            echozn "rules libinjection response";
        }

        location /rules-libinjection-body {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_LIBINJECTION_RULES_FILE__;
            echozn "rules libinjection body response";
        }

        location /rules-transform {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_TRANSFORM_RULES_FILE__;
            echozn "rules transform response";
        }

        location /rules-transform-query {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_TRANSFORM_RULES_FILE__;
            echozn "rules transform query response";
        }

        location /rules-transform-none {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_TRANSFORM_RULES_FILE__;
            echozn "rules transform none response";
        }

        location /rules-operators-regex {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_OPERATORS_RULES_FILE__;
            echozn "rules operators regex response";
        }

        location /rules-operators-prefix {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_OPERATORS_RULES_FILE__;
            echozn "rules operators prefix response";
        }

        location /rules-operators-suffix {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_OPERATORS_RULES_FILE__;
            echozn "rules operators suffix response";
        }

        location /rules-operators-pm {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_OPERATORS_RULES_FILE__;
            echozn "rules operators pm response";
        }

        location /rules-operators-equals {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_OPERATORS_RULES_FILE__;
            echozn "rules operators equals response";
        }

        location /rules-collections-query {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_COLLECTIONS_RULES_FILE__;
            echozn "rules collections query response";
        }

        location /rules-collections-line {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_COLLECTIONS_RULES_FILE__;
            echozn "rules collections line response";
        }

        location /rules-collections-header {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_COLLECTIONS_RULES_FILE__;
            echozn "rules collections header response";
        }

        location /rules-collections-cookie {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_COLLECTIONS_RULES_FILE__;
            echozn "rules collections cookie response";
        }

        location /rules-collections-arg {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_COLLECTIONS_RULES_FILE__;
            echozn "rules collections arg response";
        }

        location /rules-collections-body {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_COLLECTIONS_RULES_FILE__;
            echozn "rules collections body response";
        }

        location /rules-body-form {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_BODY_RULES_FILE__;
            echozn "rules body form response";
        }

        location /rules-body-json-nested {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_BODY_RULES_FILE__;
            echozn "rules body json nested response";
        }

        location /rules-body-multipart {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_BODY_RULES_FILE__;
            echozn "rules body multipart response";
        }

        location /rules-response-status {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RESPONSE_RULES_FILE__;
            return 204;
        }

        location /rules-response-header {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RESPONSE_RULES_FILE__;
            add_header X-Response-Waf response-header-hit always;
            return 204;
        }
    }
}
