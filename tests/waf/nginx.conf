daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    server {
        listen 8888;

        # Default location with WAF enabled in block mode
        location /api {
            waf on;
            waf_mode block;
            waf_sqli on;
            waf_xss on;
            echozn "api response";
        }

        # Location with WAF in detect mode (logs but doesn't block)
        location /detect {
            waf on;
            waf_mode detect;
            waf_sqli on;
            waf_xss on;
            echozn "detect response";
        }

        # Parent detect mode with nested child inheriting mode/settings
        location /detect-parent {
            waf on;
            waf_mode detect;
            waf_sqli on;
            waf_xss on;

            location /detect-parent/child {
                echozn "detect child response";
            }
        }

        # Location with WAF disabled
        location /disabled {
            waf off;
            echozn "disabled response";
        }

        # Location with only SQLi detection
        location /sqli-only {
            waf on;
            waf_mode block;
            waf_sqli on;
            waf_xss off;
            echozn "sqli-only response";
        }

        # Location with only XSS detection
        location /xss-only {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss on;
            echozn "xss-only response";
        }

        # Location with body checking enabled
        location /body {
            waf on;
            waf_mode block;
            waf_sqli on;
            waf_xss on;
            waf_check_body on;
            echozn "body response";
        }

        # Clean endpoint for normal requests
        location /clean {
            waf on;
            waf_mode block;
            echozn "clean response";
        }

        # Native rule-file subset (block mode)
        location /rules {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules response";
        }

        # Native rule-file subset (detect mode)
        location /rules-detect {
            waf on;
            waf_mode detect;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules detect response";
        }

        # Body rule without built-in SQLi/XSS detectors
        location /rules-body {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules body response";
        }

        location /rules-headers {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules headers response";
        }

        location /rules-cookies {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules cookies response";
        }

        location /rules-method {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules method response";
        }

        location /rules-ip {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules ip response";
        }

        location /rules-regex {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules regex response";
        }

        location /rules-equals {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules equals response";
        }

        location /rules-header-selector {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules header selector response";
        }

        location /rules-cookie-selector {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules cookie selector response";
        }

        location /rules-arg-selector {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules arg selector response";
        }

        location /rules-status {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_RULES_FILE__;
            echozn "rules status response";
        }

        location /rules-ban {
            waf on;
            waf_mode detect;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_BAN_RULES_FILE__;
            waf_ban_threshold 2;
            waf_ban_window 60;
            waf_ban_duration 1;
            echozn "rules ban response";
        }

        # Explicit libinjection rule operators
        location /rules-libinjection {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_LIBINJECTION_RULES_FILE__;
            echozn "rules libinjection response";
        }

        location /rules-libinjection-body {
            waf on;
            waf_mode block;
            waf_sqli off;
            waf_xss off;
            waf_rules_file __WAF_LIBINJECTION_RULES_FILE__;
            echozn "rules libinjection body response";
        }
    }
}
