daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    cache_tags_header X-Cache-Tags;

    upstream backend {
        server 127.0.0.1:19002;
    }

    server {
        listen 8888;

        location /custom/ {
            cache_tags;
            proxy_pass http://backend;
            proxy_pass_header X-Cache-Tags;
        }

        location /cache/purge {
            cache_tags_purge;
        }
    }
}
